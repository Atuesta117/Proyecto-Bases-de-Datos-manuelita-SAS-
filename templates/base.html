<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Manuelita SAS{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='../static/css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='../static/css/forms.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Manuelita SAS</h1>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Inicio</a></li>
                <li><a href="{{ url_for('clientes.ver_clientes') }}">Clientes</a></li>
                <li><a href="{{ url_for('proveedores.ver_proveedores') }}">Proveedores</a></li>
                <li><a href="{{ url_for('pedidos_views.ver_pedidos') }}">Pedidos</a></li>
                <li><a href="{{ url_for('facturas_views.ver_facturas') }}">Facturas</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 Manuelita SAS. Todos los derechos reservados.</p>
    </footer>

    <script src="{{ url_for('static', filename='../static/js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='../static/js/crud.js') }}"></script>
</body>
</html>
